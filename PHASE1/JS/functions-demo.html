<!DOCTYPE html>
<html>
    <script>
        function calculateTax( amount , rate){
            let tax = amount * (rate/100);
            return tax;
        };

        let myTax = calculateTax(50 , 10);
        console.log("myTax = ", myTax);
    </script>

    <script>
        function greet( name ){
            let greeting = "Hi" + name;
            return greeting;
        };

        let greetme = greet("Siddhi");
        console.log("greeting = ", greetme);
    </script>
</html>
