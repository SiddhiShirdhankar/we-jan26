<!DOCTYPE html>
<html>
<head>
    <title>For Loop</title>
</head>

<body>
    <h2>Demo of for loop</h2>
    <p>Printing multiple times</p>

    <script>
        function greet(name, count){
            return "Hi "+ name + " this is greeting number " + count;
        }

        for(let i=1;i <= 5 ; i++){
            let message = greet("Siddhi",i);
            console.log(message);
        }
        console.log("Loop is finished");
    </script>
</body>

</html>
